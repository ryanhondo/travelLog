---
layout: default
---

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ site.title }}</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    header {
      padding: 20px;
      background: #f5f5f5;
    }

    .container {
      display: flex;
    }

    .sidebar {
      width: 250px;
      padding: 20px;
      background: #fafafa;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    #map {
      height: 400px;
      margin-bottom: 40px;
      border-radius: 10px;
    }

    .entry {
      margin-bottom: 30px;
    }

    .entry a {
      text-decoration: none;
      color: black;
    }

    .entry a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<header>
  <h1>Ryan & [GF Name] in New Zealand 🇳🇿</h1>
</header>

<div class="container">

  <div class="sidebar">
    <h3>Places Visited</h3>
    <ul>
      {% for post in site.posts %}
        <li>{{ post.title }}</li>
      {% endfor %}
    </ul>
  </div>

  <div class="main">

    <!-- MAP -->
    <div id="map"></div>

    <!-- BLOG POSTS -->
    <h2>Journal</h2>

    {% for post in site.posts %}
      <div class="entry">
        <h3>
          <a href="{{ post.url }}">{{ post.title }}</a>
        </h3>
        <p>{{ post.excerpt }}</p>
      </div>
    {% endfor %}

  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  var map = L.map('map').setView([-41.3, 174.7], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  {% for post in site.posts %}
    {% if post.lat and post.lng %}
      L.marker([{{ post.lat }}, {{ post.lng }}])
        .addTo(map)
        .bindPopup('<a href="{{ post.url }}">{{ post.title }}</a>');
    {% endif %}
  {% endfor %}
</script>

</body>
</html>
